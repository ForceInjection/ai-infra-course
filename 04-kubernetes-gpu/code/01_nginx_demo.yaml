# 模块 4：K8s 基础 — Nginx 完整示例 (ConfigMap + Deployment + Service)
# 用法: kubectl apply -f 01_nginx_demo.yaml
# 对应 PPT 第 16 页 [动手] K8s 初体验
# 所有资源部署在 gpu-demo namespace

---
# ===== Namespace =====
apiVersion: v1
kind: Namespace
metadata:
  name: gpu-demo

---
# ===== ConfigMap: 自定义 nginx 首页 =====
# 演示"配置与镜像分离" — 不改镜像, 只改 ConfigMap 就能换页面内容
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-index
  namespace: gpu-demo
  labels:
    app: nginx-demo
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>K8s Nginx Demo</title></head>
    <body>
      <h1>Hello from Kubernetes!</h1>
      <p>Pod Name: <strong>nginx-demo</strong></p>
      <p>This page is served from a ConfigMap.</p>
    </body>
    </html>

---
# ===== Deployment: 2 副本 nginx, 挂载 ConfigMap =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: gpu-demo
  labels:
    app: nginx-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        # 资源限制 — 引出 K8s 资源管理, 顺接到 nvidia.com/gpu
        resources:
          requests:
            cpu: "250m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "128Mi"
        # 挂载 ConfigMap 到 nginx 默认首页位置
        volumeMounts:
        - name: nginx-index
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: nginx-index
        configMap:
          name: nginx-index

---
# ===== Service: NodePort 暴露 + 内部 ClusterIP =====
apiVersion: v1
kind: Service
metadata:
  name: nginx-demo
  namespace: gpu-demo
  labels:
    app: nginx-demo
spec:
  type: NodePort
  selector:
    app: nginx-demo
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080  # 通过 <NodeIP>:30080 访问
