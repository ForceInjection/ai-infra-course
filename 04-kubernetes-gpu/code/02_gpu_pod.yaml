# 模块 4：GPU Pod — 声明 GPU 资源
# 用法: kubectl apply -f 02_gpu_pod.yaml
# 对应 PPT 第 45 页 [动手 1]
apiVersion: v1
kind: Pod
metadata:
  name: gpu-test
spec:
  restartPolicy: Never
  containers:
  - name: cuda
    image: nvidia/cuda:12.4.0-base-ubuntu22.04
    command: ["nvidia-smi"]
    resources:
      limits:
        nvidia.com/gpu: 1  # 声明需要 1 张 GPU — Device Plugin 负责分配
