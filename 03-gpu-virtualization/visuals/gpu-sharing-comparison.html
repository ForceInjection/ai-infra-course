<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPU 虚拟化方案对比 — MIG · Time-Slicing · HAMi · MPS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#1A0F2E; color:#C8BEE0; height:100vh; overflow:hidden; display:flex; flex-direction:column; }
.header { text-align:center; padding:14px 16px 4px; flex-shrink:0; }
.header h1 { font-size:1.3em; color:#F8F6FB; }
.header p { color:#8A7BB5; margin-top:2px; font-size:0.78em; }
.main-wrap { max-width:1250px; width:100%; margin:0 auto; padding:0 10px 8px; flex:1; min-height:0; display:flex; align-items:center; justify-content:center; }
svg { max-width:100%; max-height:100%; }
</style>
</head>
<body>
<div class="header">
  <h1>GPU 虚拟化方案对比 — 四种形态 · 隔离级别 · 灵活性</h1>
</div>
<div class="main-wrap">
<svg viewBox="0 0 1100 720">
  <!-- background -->
  <rect x="0" y="0" width="1100" height="720" rx="16" fill="#1A0F2E" stroke="#432879" stroke-width="2"/>

  <!-- ============ TOP ROW: MIG + Time-Slicing ============ -->

  <!-- MIG panel -->
  <rect x="30" y="23" width="510" height="280" rx="10" fill="#231440" stroke="#432879" stroke-width="1"/>
  <!-- MIG title bar -->
  <rect x="30" y="23" width="510" height="34" rx="10" fill="#156082"/>
  <rect x="30" y="33" width="510" height="24" fill="#156082"/>
  <text x="285" y="45" text-anchor="middle" font-size="15" fill="#FFFFFF" font-weight="bold" font-family="sans-serif">MIG (Multi-Instance GPU) — 硬件级物理分区</text>

  <!-- MIG visual: 1 GPU → 多个独立实例 -->
  <rect x="60" y="73" width="120" height="100" rx="6" fill="#0E2841" stroke="#156082" stroke-width="2"/>
  <text x="120" y="113" text-anchor="middle" font-size="12" fill="#F8F6FB" font-weight="bold" font-family="sans-serif">完整 GPU</text>
  <text x="120" y="133" text-anchor="middle" font-size="10" fill="#8A7BB5" font-family="sans-serif">A100/H100 (80GB)</text>
  <text x="120" y="153" text-anchor="middle" font-size="10" fill="#8A7BB5" font-family="sans-serif">132 SM</text>

  <!-- Arrow -->
  <text x="190" y="128" text-anchor="middle" font-size="20" fill="#0F9ED5" font-family="sans-serif">→</text>

  <!-- Partitioned instances -->
  <rect x="220" y="73" width="80" height="100" rx="4" fill="#0E2841" stroke="#0F9ED5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="260" y="105" text-anchor="middle" font-size="11" fill="#0F9ED5" font-weight="bold" font-family="sans-serif">3g.40gb</text>
  <text x="260" y="123" text-anchor="middle" font-size="9" fill="#8A7BB5" font-family="sans-serif">42 SM</text>
  <text x="260" y="139" text-anchor="middle" font-size="9" fill="#8A7BB5" font-family="sans-serif">40 GB</text>
  <text x="260" y="155" text-anchor="middle" font-size="9" fill="#8A7BB5" font-family="sans-serif">独享 L2</text>

  <rect x="310" y="73" width="80" height="100" rx="4" fill="#0E2841" stroke="#0F9ED5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="350" y="105" text-anchor="middle" font-size="11" fill="#0F9ED5" font-weight="bold" font-family="sans-serif">2g.20gb</text>
  <text x="350" y="123" text-anchor="middle" font-size="9" fill="#8A7BB5" font-family="sans-serif">28 SM</text>
  <text x="350" y="139" text-anchor="middle" font-size="9" fill="#8A7BB5" font-family="sans-serif">20 GB</text>
  <text x="350" y="155" text-anchor="middle" font-size="9" fill="#8A7BB5" font-family="sans-serif">独享 L2</text>

  <rect x="400" y="73" width="60" height="100" rx="4" fill="#0E2841" stroke="#0F9ED5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="430" y="123" text-anchor="middle" font-size="11" fill="#0F9ED5" font-weight="bold" font-family="sans-serif">1g.5gb</text>
  <text x="430" y="143" text-anchor="middle" font-size="9" fill="#8A7BB5" font-family="sans-serif">14 SM</text>

  <!-- MIG key points -->
  <text x="80" y="223" text-anchor="start" font-size="11" fill="#C8BEE0" font-family="sans-serif">隔离级别：硬件级 (SM + 显存 + L2 Cache + 内存带宽)</text>
  <text x="80" y="243" text-anchor="start" font-size="11" fill="#C8BEE0" font-family="sans-serif">切分粒度：固定 profile (1g.5gb ~ 7g.80gb)，不可动态调整</text>
  <text x="80" y="263" text-anchor="start" font-size="11" fill="#C8BEE0" font-family="sans-serif">支持 GPU：仅 A100/A30/H100/H200，消费级不支持</text>
  <text x="80" y="283" text-anchor="start" font-size="11" fill="#4ade80" font-family="sans-serif">适用：医疗影像 AI、金融风控 — 需要硬件级安全隔离</text>

  <!-- Time-Slicing panel -->
  <rect x="560" y="23" width="510" height="280" rx="10" fill="#231440" stroke="#432879" stroke-width="1"/>
  <rect x="560" y="23" width="510" height="34" rx="10" fill="#A02B93"/>
  <rect x="560" y="33" width="510" height="24" fill="#A02B93"/>
  <text x="815" y="45" text-anchor="middle" font-size="15" fill="#FFFFFF" font-weight="bold" font-family="sans-serif">Time-Slicing — 内核级时间片轮转</text>

  <!-- Time-Slicing visual: time axis -->
  <text x="620" y="90" text-anchor="start" font-size="11" fill="#F8F6FB" font-weight="bold" font-family="sans-serif">时间轴：</text>
  <rect x="620" y="100" width="420" height="24" rx="4" fill="#0E2841" stroke="#432879" stroke-width="1"/>
  <rect x="620" y="100" width="100" height="24" rx="4" fill="#A02B93" stroke="#A02B93" stroke-width="0"/>
  <text x="670" y="116" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="bold" font-family="sans-serif">User A</text>
  <rect x="722" y="100" width="100" height="24" fill="#614F96"/>
  <text x="772" y="116" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="bold" font-family="sans-serif">User B</text>
  <rect x="824" y="100" width="100" height="24" fill="#A02B93"/>
  <text x="874" y="116" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="bold" font-family="sans-serif">User A</text>
  <rect x="926" y="100" width="114" height="24" rx="4" fill="#614F96"/>
  <text x="983" y="116" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="bold" font-family="sans-serif">User C</text>

  <!-- GPU resource visualization -->
  <text x="620" y="155" text-anchor="start" font-size="11" fill="#F8F6FB" font-weight="bold" font-family="sans-serif">GPU 资源 (共享，时间复用)：</text>
  <rect x="620" y="167" width="420" height="56" rx="6" fill="#0E2841" stroke="#A02B93" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="830" y="190" text-anchor="middle" font-size="18" fill="#A02B93" font-weight="bold" font-family="sans-serif">?</text>
  <text x="830" y="210" text-anchor="middle" font-size="10" fill="#8A7BB5" font-family="sans-serif">完整 GPU，轮流独占</text>

  <!-- Key points -->
  <text x="590" y="255" text-anchor="start" font-size="11" fill="#C8BEE0" font-family="sans-serif">隔离级别：软件级 (显存按需分配，算力轮流独占)</text>
  <text x="590" y="271" text-anchor="start" font-size="11" fill="#8A7BB5" font-family="sans-serif">支持 GPU：全系列 (Tesla/Quadro/消费级)</text>
  <text x="590" y="287" text-anchor="start" font-size="11" fill="#fbbf24" font-family="sans-serif">适用：教学实验、开发测试 — 对性能波动容忍度高</text>

  <!-- ============ BOTTOM ROW: HAMi + MPS ============ -->

  <!-- HAMi panel -->
  <rect x="30" y="325" width="510" height="280" rx="10" fill="#231440" stroke="#432879" stroke-width="1"/>
  <rect x="30" y="325" width="510" height="34" rx="10" fill="#E97132"/>
  <rect x="30" y="335" width="510" height="24" fill="#E97132"/>
  <text x="285" y="347" text-anchor="middle" font-size="15" fill="#FFFFFF" font-weight="bold" font-family="sans-serif">HAMi-core — 用户态 LD_PRELOAD 拦截</text>

  <!-- HAMi visual: app → libvgpu.so → real CUDA → GPU -->
  <text x="75" y="395" text-anchor="start" font-size="11" fill="#F8F6FB" font-weight="bold" font-family="sans-serif">每个容器：</text>

  <rect x="75" y="407" width="130" height="42" rx="5" fill="#231440" stroke="#432879" stroke-width="1"/>
  <text x="140" y="425" text-anchor="middle" font-size="10" fill="#C8BEE0" font-family="sans-serif">Container A</text>
  <text x="140" y="441" text-anchor="middle" font-size="9" fill="#8A7BB5" font-family="sans-serif">cudaMalloc(1GB)</text>

  <text x="215" y="432" text-anchor="middle" font-size="16" fill="#E97132" font-family="sans-serif">→</text>

  <rect x="230" y="407" width="130" height="42" rx="5" fill="#422006" stroke="#E97132" stroke-width="2"/>
  <text x="295" y="425" text-anchor="middle" font-size="10" fill="#E97132" font-weight="bold" font-family="sans-serif">libvgpu.so</text>
  <text x="295" y="441" text-anchor="middle" font-size="9" fill="#fbbf24" font-family="sans-serif">配额检查：1GB ≤ 2GB?</text>

  <text x="375" y="432" text-anchor="middle" font-size="16" fill="#4ade80" font-family="sans-serif">→</text>

  <rect x="390" y="407" width="110" height="42" rx="5" fill="#0E2841" stroke="#4ade80" stroke-width="1.5"/>
  <text x="445" y="425" text-anchor="middle" font-size="10" fill="#4ade80" font-family="sans-serif">cuMemAlloc 放行</text>
  <text x="445" y="441" text-anchor="middle" font-size="9" fill="#8A7BB5" font-family="sans-serif">→ VRAM 分配成功</text>

  <!-- Container B -->
  <rect x="75" y="460" width="130" height="42" rx="5" fill="#231440" stroke="#432879" stroke-width="1"/>
  <text x="140" y="478" text-anchor="middle" font-size="10" fill="#C8BEE0" font-family="sans-serif">Container B</text>
  <text x="140" y="494" text-anchor="middle" font-size="9" fill="#8A7BB5" font-family="sans-serif">cudaMalloc(2GB)</text>

  <text x="215" y="485" text-anchor="middle" font-size="16" fill="#E97132" font-family="sans-serif">→</text>

  <rect x="230" y="460" width="130" height="42" rx="5" fill="#422006" stroke="#E97132" stroke-width="2"/>
  <text x="295" y="478" text-anchor="middle" font-size="10" fill="#E97132" font-weight="bold" font-family="sans-serif">libvgpu.so</text>
  <text x="295" y="494" text-anchor="middle" font-size="9" fill="#f87171" font-family="sans-serif">配额检查：2GB > 2GB?</text>

  <text x="375" y="485" text-anchor="middle" font-size="16" fill="#ef4444" font-family="sans-serif">→ ✗</text>

  <rect x="390" y="460" width="110" height="42" rx="5" fill="#3f1a1a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="445" y="478" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="bold" font-family="sans-serif">返回错误</text>
  <text x="445" y="494" text-anchor="middle" font-size="9" fill="#fca5a5" font-family="sans-serif">显存不足</text>

  <!-- Key points -->
  <text x="75" y="547" text-anchor="start" font-size="11" fill="#C8BEE0" font-family="sans-serif">隔离级别：用户态软件拦截 (CUDA API hook)</text>
  <text x="75" y="567" text-anchor="start" font-size="11" fill="#C8BEE0" font-family="sans-serif">显存硬隔离 + 令牌桶算力限制 (cuLaunchKernel)</text>
  <text x="75" y="587" text-anchor="start" font-size="11" fill="#4ade80" font-family="sans-serif">适用：互联网推理集群 — 最灵活，全 GPU 兼容</text>

  <!-- MPS panel -->
  <rect x="560" y="325" width="510" height="280" rx="10" fill="#231440" stroke="#432879" stroke-width="1"/>
  <rect x="560" y="325" width="510" height="34" rx="10" fill="#196B24"/>
  <rect x="560" y="335" width="510" height="24" fill="#196B24"/>
  <text x="815" y="347" text-anchor="middle" font-size="15" fill="#FFFFFF" font-weight="bold" font-family="sans-serif">MPS (Multi-Process Service) — 进程级共享</text>

  <!-- MPS visual: multiple processes share one CUDA context -->
  <text x="615" y="395" text-anchor="start" font-size="11" fill="#F8F6FB" font-weight="bold" font-family="sans-serif">GPU 内共享单一 CUDA Context：</text>

  <rect x="615" y="415" width="400" height="100" rx="6" fill="#0E2841" stroke="#196B24" stroke-width="1.5"/>
  <!-- MPS Server -->
  <rect x="635" y="425" width="120" height="50" rx="5" fill="#052e16" stroke="#196B24" stroke-width="1.5"/>
  <text x="695" y="447" text-anchor="middle" font-size="11" fill="#4ade80" font-weight="bold" font-family="sans-serif">MPS Server</text>
  <text x="695" y="465" text-anchor="middle" font-size="9" fill="#8A7BB5" font-family="sans-serif">(单一 Context)</text>

  <!-- Client processes -->
  <rect x="775" y="425" width="70" height="35" rx="4" fill="#231440" stroke="#432879" stroke-width="0.8"/>
  <text x="810" y="447" text-anchor="middle" font-size="9" fill="#C8BEE0" font-family="sans-serif">Client 1</text>
  <rect x="855" y="425" width="70" height="35" rx="4" fill="#231440" stroke="#432879" stroke-width="0.8"/>
  <text x="890" y="447" text-anchor="middle" font-size="9" fill="#C8BEE0" font-family="sans-serif">Client 2</text>
  <rect x="935" y="425" width="60" height="35" rx="4" fill="#231440" stroke="#432879" stroke-width="0.8"/>
  <text x="965" y="447" text-anchor="middle" font-size="9" fill="#C8BEE0" font-family="sans-serif">...</text>

  <!-- Clients connect to MPS -->
  <line x1="775" y1="455" x2="757" y2="460" stroke="#432879" stroke-width="0.8"/>
  <line x1="855" y1="455" x2="757" y2="473" stroke="#432879" stroke-width="0.8"/>
  <line x1="935" y1="455" x2="757" y2="486" stroke="#432879" stroke-width="0.8"/>

  <!-- Arrow -->
  <text x="625" y="495" text-anchor="start" font-size="10" fill="#8A7BB5" font-family="sans-serif">所有 Client 共享同一 Context → 无显存隔离</text>

  <!-- Key points -->
  <text x="590" y="547" text-anchor="start" font-size="11" fill="#C8BEE0" font-family="sans-serif">隔离级别：进程级共享，无硬件/显存隔离</text>
  <text x="590" y="567" text-anchor="start" font-size="11" fill="#f87171" font-family="sans-serif">风险：一个进程 OOM 或崩溃 → 影响所有 Client</text>
  <text x="590" y="587" text-anchor="start" font-size="11" fill="#4ade80" font-family="sans-serif">适用：同用户多进程 MPI 训练 — 信任域内高效共享</text>

  <!-- ============ BOTTOM: 对比象限 ============ -->
  <rect x="120" y="625" width="860" height="90" rx="8" fill="#231440" stroke="#432879" stroke-width="1"/>
  <text x="550" y="647" text-anchor="middle" font-size="12" fill="#F8F6FB" font-weight="bold" font-family="sans-serif">隔离级别 × 灵活性</text>

  <!-- Axis -->
  <text x="550" y="706" text-anchor="middle" font-size="10" fill="#8A7BB5" font-family="sans-serif">高隔离 ←─────────────────────────────→ 低隔离</text>

  <!-- MIG marker (left = high isolation, low flexibility) -->
  <rect x="185" y="663" width="14" height="14" rx="3" fill="#156082"/>
  <text x="204" y="675" text-anchor="start" font-size="9" fill="#F8F6FB" font-weight="bold" font-family="sans-serif">MIG</text>
  <text x="204" y="685" text-anchor="start" font-size="8" fill="#8A7BB5" font-family="sans-serif">硬件分区·固定规格</text>

  <!-- Time-Slicing marker -->
  <rect x="390" y="663" width="14" height="14" rx="3" fill="#A02B93"/>
  <text x="409" y="675" text-anchor="start" font-size="9" fill="#F8F6FB" font-weight="bold" font-family="sans-serif">Time-Slicing</text>
  <text x="409" y="685" text-anchor="start" font-size="8" fill="#8A7BB5" font-family="sans-serif">内核调度·全 GPU 支持</text>

  <!-- HAMi marker -->
  <rect x="625" y="663" width="14" height="14" rx="3" fill="#E97132"/>
  <text x="644" y="675" text-anchor="start" font-size="9" fill="#F8F6FB" font-weight="bold" font-family="sans-serif">HAMi-core</text>
  <text x="644" y="685" text-anchor="start" font-size="8" fill="#8A7BB5" font-family="sans-serif">用户态拦截·最灵活</text>

  <!-- MPS marker -->
  <rect x="835" y="663" width="14" height="14" rx="3" fill="#196B24"/>
  <text x="854" y="675" text-anchor="start" font-size="9" fill="#F8F6FB" font-weight="bold" font-family="sans-serif">MPS</text>
  <text x="854" y="685" text-anchor="start" font-size="8" fill="#8A7BB5" font-family="sans-serif">进程共享·低隔离</text>
</svg>
</div>
</body>
</html>
